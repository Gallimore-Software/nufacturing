<div fxLayout="row" fxLayoutAlign="center center" class="container">
    <!-- Cost Section (100%) -->
    <div fxFlex="100%" fxLayoutAlign="center center">
      <mat-card>
        <mat-card-title>Order Costs</mat-card-title>
        <mat-card-content>
          <div fxLayout="row" fxLayoutAlign="center center">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 table-container">
              <ng-container matColumnDef="property">
                <th mat-header-cell *matHeaderCellDef> Property </th>
                <td mat-cell *matCellDef="let element"> {{element.property}} </td>
              </ng-container>
  
              <ng-container matColumnDef="value">
                <th mat-header-cell *matHeaderCellDef> Value </th>
                <td mat-cell *matCellDef="let element"> {{element.value}} </td>
              </ng-container>
  
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
