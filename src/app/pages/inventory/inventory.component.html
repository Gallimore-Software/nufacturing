<div class="dashboard">
  <mat-card class="summary-card">
    <h3>Inventory Summary</h3>
    <!-- Replace this with an actual chart component -->
    <canvas id="inventoryChart"></canvas>
    <div *ngIf="isAdminOrManager">
      <button mat-raised-button color="primary" (click)="createNewInventory()">
        Create New Inventory
      </button>
    </div>
  </mat-card>
</div>

<div class="inventory-table">
  <mat-form-field appearance="outline">
    <!-- Use valid appearance attribute value -->
    <mat-label>Search Data</mat-label>
    <input
      matInput
      (keyup)="applyFilter($event)"
      placeholder="Search for data"
    />
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" matSort>
    <!-- Ingredient Name Column -->
    <ng-container matColumnDef="ingredientName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Ingredient Name</th>
      <td mat-cell *matCellDef="let element">{{ element.ingredientName }}</td>
    </ng-container>

    <!-- Price Per Kg Column -->
    <ng-container matColumnDef="pricePerKg">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Price Per Kg</th>
      <td mat-cell *matCellDef="let element">
        {{ element.pricePerKg | currency }}
      </td>
    </ng-container>

    <!-- Stock Quantity Column -->
    <ng-container matColumnDef="stockQuantity">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Stock Quantity</th>
      <td mat-cell *matCellDef="let element">{{ element.stockQuantity }}</td>
    </ng-container>

    <!-- Category Column -->
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
      <td mat-cell *matCellDef="let element">{{ element.category }}</td>
    </ng-container>

    <!-- Type Column -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
      <td mat-cell *matCellDef="let element">{{ element.type }}</td>
    </ng-container>

    <!-- SubCategory Column -->
    <ng-container matColumnDef="subCategory">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>SubCategory</th>
      <td mat-cell *matCellDef="let element">{{ element.subCategory }}</td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button
          mat-icon-button
          *ngIf="isAdminOrManager; else editDisabled"
          (click)="editInventoryItem(element)"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <ng-template #editDisabled>
          <mat-icon>remove</mat-icon>
        </ng-template>
        <button
          mat-icon-button
          color="warn"
          *ngIf="isAdminOrManager"
          (click)="deleteInventoryItem(element)"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
  ></mat-paginator>
</div>
