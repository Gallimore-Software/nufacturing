<h2 mat-dialog-title>Create New Inventory Item</h2>
<mat-dialog-content>
  <form [formGroup]="inventoryForm">
    <!-- Type -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        <mat-option value="Nufacturing">Nufacturing</mat-option>
        <mat-option value="Customer Supplied">Customer Supplied</mat-option>
        <mat-option value="R&D/Lab">R&D/Lab</mat-option>
        <mat-option value="Ancillary">Ancillary</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Category -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option value="Raw Materials">Raw Materials</mat-option>
        <mat-option value="Capsules">Capsules</mat-option>
        <mat-option value="Packaging">Packaging</mat-option>
        <mat-option value="Labels">Labels</mat-option>
        <mat-option value="Finished Products">Finished Products</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- SubCategory -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>SubCategory</mat-label>
      <input matInput formControlName="subCategory" placeholder="Ex. Customer 1" />
    </mat-form-field>

    <!-- Ingredient Name -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Ingredient Name</mat-label>
      <input matInput formControlName="ingredientName" placeholder="Ex. Ingredient A" />
    </mat-form-field>

    <!-- Price Per Kg -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Price Per Kg</mat-label>
      <input matInput type="number" formControlName="pricePerKg" />
    </mat-form-field>

    <!-- Stock Quantity -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Stock Quantity</mat-label>
      <input matInput type="number" formControlName="stockQuantity" />
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-button color="primary" (click)="onSubmit()" [disabled]="!inventoryForm.valid">Save</button>
</mat-dialog-actions>
