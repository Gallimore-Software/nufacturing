<h2 mat-dialog-title>Create New Inventory Item</h2>
<mat-dialog-content>
  <form [formGroup]="inventoryForm">
    <!-- Ingredient Name -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Ingredient Name</mat-label>
      <input matInput formControlName="ingredientName" placeholder="Ex. Ingredient A" />
    </mat-form-field>

    <!-- Unit of Measurement -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Unit of Measurement</mat-label>
      <input matInput formControlName="unitOfMeasurement" placeholder="Ex. kg, lb, g" />
    </mat-form-field>

    <!-- Price Per Unit -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Price Per Unit</mat-label>
      <input matInput type="number" formControlName="pricePerUnit" placeholder="Enter price per unit" />
    </mat-form-field>

    <!-- Stock Quantity -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Stock Quantity</mat-label>
      <input matInput type="number" formControlName="stockQuantity" placeholder="Enter stock quantity" />
    </mat-form-field>

    <!-- Minimum Order Quantity -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Minimum Order Quantity</mat-label>
      <input matInput type="number" formControlName="minOrderQuantity" placeholder="Enter minimum order quantity" />
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-button color="primary" (click)="onSubmit()" [disabled]="!inventoryForm.valid">Save</button>
</mat-dialog-actions>
