<div class="wrapper">
  <div class="container">
    <div class="exampleHeader">
      <div class="tabs">
        <button class="tabButton" (click)="handleTabClick('all')">All</button>
        <button class="tabButton" (click)="handleTabClick('active')">
          Active
        </button>
        <button class="tabButton" (click)="handleTabClick('paused')">
          Paused
        </button>
        <button class="tabButton" (click)="handleTabClick('outOfStock')">
          Out of Stock
        </button>
      </div>
      <div class="inputWrapper">
        <!-- <input
          type="text"
          placeholder="Search material..."
          [(ngModel)]="quickFilterText"
        /> -->
      </div>
    </div>

    <div class="grid">
      <ag-grid-angular
        style="width: 100%; height: 100%;"
        class="ag-theme-alpine"
        [columnDefs]="columnDefs"
        [rowData]="rowData"
        [defaultColDef]="defaultColDef"
        [pagination]="true"
        [paginationPageSize]="10"
        (gridReady)="onGridReady($event)"
      ></ag-grid-angular>
    </div>
  </div>
</div>
