<div class="dashboard">

    <h3>Finished Goods</h3>

  </div>

  <div class="table-section">
    <h3>Raw Materials</h3>

    <inventory-inventory-items-table [dataSource]="wip"></inventory-inventory-items-table>

  <div class="table-section">
