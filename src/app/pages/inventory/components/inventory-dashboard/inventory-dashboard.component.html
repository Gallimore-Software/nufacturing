<div class="dashboard-container">
  <h1>Inventory Dashboard</h1>

  <!-- Button to Open Create Inventory Item Dialog -->
  <button
    mat-raised-button
    color="primary"
    (click)="openCreateInventoryDialog()"
  >
    + Create New Inventory Item
  </button>

  <div class="inventory-summary">
    <h2>Overview</h2>
    <div class="summary-cards">
      <mat-card class="summary-card">
        <mat-card-title>Total Raw Materials</mat-card-title>
        <mat-card-content>{{ rawMaterialsCount }}</mat-card-content>
      </mat-card>
      <mat-card class="summary-card">
        <mat-card-title>Work in Progress</mat-card-title>
        <mat-card-content>{{ wipCount }}</mat-card-content>
      </mat-card>
      <mat-card class="summary-card">
        <mat-card-title>Finished Goods</mat-card-title>
        <mat-card-content>{{ finishedGoodsCount }}</mat-card-content>
      </mat-card>
      <mat-card class="summary-card">
        <mat-card-title>Components</mat-card-title>
        <mat-card-content>{{ componentsCount }}</mat-card-content>
      </mat-card>
    </div>

    <app-inventory-items-table></app-inventory-items-table>
    <app-finished-goods-table></app-finished-goods-table>
    <app-product-components-table></app-product-components-table>
    <app-raw-materials-table></app-raw-materials-table>
    <app-wip-table></app-wip-table>

  </div>

</div>
