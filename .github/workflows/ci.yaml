name: CI

on:
  push:
    branches:
      - story/*
      - feature/*
      - dev
      - qa/*
      - release_candidate/*
      - main
      - hotfix/*

  pull_request:
    branches:
      - feature/*
      - dev
      - qa/*
      - release_candidate/*
      - main
      - hotfix/*

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Cache dependencies
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Lint the code
      - name: Run linting
        run: npm run lint

      # Run Prettier check
      - name: Run Prettier
        run: npm run prettier

      # Run Jest tests with coverage
      - name: Run unit tests with coverage
        run: npm test --coverage

      # Upload test coverage report as an artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  pact:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Start Mock Server (Background)
        run: |
          nohup npm run start-mock-server &

      - name: Run Pact tests
        run: npm run pact

  deploy:
    runs-on: ubuntu-latest
    needs: [build, pact]
    if: github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      # Build the project before deploying
      - name: Build project
        run: npm run build

      # Deploy to Azure Static Web Apps
      - name: Build And Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (i.e., PR comments)
          action: 'upload'
          app_location: '/' # App source code path
          api_location: '' # Api source code path - optional
          output_location: 'dist/nufacturing' # Built app content directory - adjust to match your app’s dist folder
